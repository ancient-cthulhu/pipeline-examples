# azure-pipelines.yml
# Veracode Security Scanning for Azure Pipelines (Multi-Artifact Support)
#
# Required variables (configure in Variable Group "veracode-credentials"):
#   - VERACODE_API_ID: Veracode API ID (secret)
#   - VERACODE_API_KEY: Veracode API Key (secret)
#   - SRCCLR_API_TOKEN: SCA Agent token (secret, optional)
#
# Scan type is auto-detected by branch:
#   feature/*  -> Pipeline Scan (no gate) - each artifact individually
#   PR to main -> Pipeline Scan (gate on Very High/High) - each artifact individually
#   release/*  -> Sandbox Scan - all artifacts bundled in zip
#   main       -> Policy Scan - all artifacts bundled in zip
#
# SCA runs on all branches.

trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*

pr:
  branches:
    include:
      - main

variables:
  - group: veracode-credentials
  - name: APP_NAME
    value: 'Azure_Application'
  - name: SANDBOX_NAME
    value: 'azure-release'

pool:
  vmImage: 'ubuntu-latest'

# =============================================================================
# Stage 1: Install Veracode CLI + Autopackager
# =============================================================================
stages:
  - stage: Package
    displayName: 'Install and package'
    jobs:
      - job: PackageApp
        displayName: 'Veracode CLI autopackager'
        steps:
          - script: |
              echo "Installing prerequisites..."
              sudo apt-get update && sudo apt-get install -y curl unzip grep zip
            displayName: 'Install prerequisites'

          - script: |
              echo "Installing Veracode CLI..."
              curl -fsS -O https://tools.veracode.com/veracode-cli/install
              chmod +x ./install
              ./install
              if [ -f "./veracode" ]; then
                chmod +x veracode
                ./veracode version
              else
                echo "##vso[task.logissue type=error]Veracode CLI failed to install"
                exit 1
              fi
            displayName: 'Install Veracode CLI'

          - script: |
              if [ -z "$VERACODE_API_ID" ] || [ -z "$VERACODE_API_KEY" ]; then
                echo "##vso[task.logissue type=error]VERACODE_API_ID and VERACODE_API_KEY are required"
                echo "Configure them in Azure Pipeline variable groups or Key Vault"
                exit 1
              fi
              echo "Veracode credentials verified"
            displayName: 'Validate Veracode credentials'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - script: |
              echo "Running Veracode Autopackager..."
              mkdir -p verascan
              ./veracode package --source "$(Build.SourcesDirectory)" --output verascan --trust
              echo "Packaged artifacts:"
              ls -lhR verascan
            displayName: 'Veracode autopackager'

          # --- List and validate all artifacts found ---
          - script: |
              echo "Listing all packaged artifacts..."
              find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
              
              if [ ! -s artifact_list.txt ]; then
                echo "##vso[task.logissue type=error]No packaged artifacts found"
                ls -lR verascan
                exit 1
              fi
              
              echo "Artifacts found:"
              cat artifact_list.txt
              
              ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
              echo "Total artifacts: $ARTIFACT_COUNT"
              echo "##vso[task.setvariable variable=ARTIFACT_COUNT;isOutput=true]$ARTIFACT_COUNT"
            name: ListArtifacts
            displayName: 'List and validate artifacts'

          # --- Create bundle zip for Policy/Sandbox scans ---
          - script: |
              echo "Creating artifact bundle for platform scans..."
              mkdir -p upload_bundle
              
              while IFS= read -r artifact; do
                echo "Copying: $artifact"
                cp "$artifact" upload_bundle/
              done < artifact_list.txt
              
              cd upload_bundle
              zip -r ../veracode_upload_bundle.zip .
              cd ..
              
              echo "Bundle created:"
              ls -lh veracode_upload_bundle.zip
              unzip -l veracode_upload_bundle.zip
            displayName: 'Create upload bundle'

          # --- Copy bundle to artifacts directory ---
          - script: |
              cp veracode_upload_bundle.zip verascan/
              cp artifact_list.txt verascan/
            displayName: 'Prepare artifacts for publishing'

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'
              artifactName: 'verascan'
            displayName: 'Publish packaged artifacts'

  # =============================================================================
  # Stage 2: SCA (all branches)
  # =============================================================================
  - stage: SCA
    displayName: 'SCA scan'
    dependsOn: Package
    jobs:
      - job: SCAScan
        displayName: 'Veracode Agent-Based SCA'
        steps:
          - checkout: self
          - script: |
              echo "Running Veracode Agent-Based SCA..."
              curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "SCA scan completed"
            displayName: 'Veracode SCA scan'
            env:
              SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

  # =============================================================================
  # Stage 3a: Pipeline Scan - Feature Branches (no gate, each artifact)
  # =============================================================================
  - stage: PipelineScan
    displayName: 'Pipeline Scan (feature)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/'),
        ne(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: PipelineScanJob
        displayName: 'Veracode Pipeline Scan (all artifacts)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              echo "Downloading Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip
              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]Failed to download pipeline-scan.jar"
                exit 1
              fi
            displayName: 'Download Pipeline Scanner'

          - script: |
              echo "Running Pipeline Scan on each artifact..."
              mkdir -p scan_results
              SCAN_COUNT=0
              
              for artifact in $(find verascan -type f \( -name "*.war" -o -name "*.jar" \) ! -name "veracode_upload_bundle.zip"); do
                SCAN_COUNT=$((SCAN_COUNT + 1))
                ARTIFACT_NAME=$(basename "$artifact")
                echo ""
                echo "=========================================="
                echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
                echo "=========================================="
                
                java -jar pipeline-scan.jar \
                  -f "$artifact" \
                  -vid $VERACODE_API_ID \
                  -vkey $VERACODE_API_KEY \
                  --fail_on_severity "" \
                  --issue_details true \
                  -jo true \
                  || echo "Pipeline scan completed with findings for $ARTIFACT_NAME"
                
                # Save results with unique name
                if [ -f "results.json" ]; then
                  mv results.json "scan_results/results_${ARTIFACT_NAME}.json"
                fi
              done
              
              echo ""
              echo "=========================================="
              echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
              echo "=========================================="
            displayName: 'Pipeline Scan (no gate, all artifacts)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-results'
            condition: succeededOrFailed()
            displayName: 'Publish Pipeline Scan results'

  # =============================================================================
  # Stage 3b: Pipeline Scan - Pull Requests (gate enabled, each artifact)
  # =============================================================================
  - stage: PipelineScanGate
    displayName: 'Pipeline Scan (PR gate)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PipelineScanGateJob
        displayName: 'Veracode Pipeline Scan with gate (all artifacts)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              echo "Downloading Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip
              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]Failed to download pipeline-scan.jar"
                exit 1
              fi
            displayName: 'Download Pipeline Scanner'

          - script: |
              echo "Running Pipeline Scan with Policy Gate on each artifact..."
              mkdir -p scan_results
              FAILED=0
              SCAN_COUNT=0
              FAILED_ARTIFACTS=""
              
              for artifact in $(find verascan -type f \( -name "*.war" -o -name "*.jar" \) ! -name "veracode_upload_bundle.zip"); do
                SCAN_COUNT=$((SCAN_COUNT + 1))
                ARTIFACT_NAME=$(basename "$artifact")
                echo ""
                echo "=========================================="
                echo "Scanning [$SCAN_COUNT]: $ARTIFACT_NAME"
                echo "=========================================="
                
                if ! java -jar pipeline-scan.jar \
                  -f "$artifact" \
                  -vid $VERACODE_API_ID \
                  -vkey $VERACODE_API_KEY \
                  --issue_details true \
                  --policy_name "Veracode Recommended Very High" \
                  -jo true; then
                  FAILED=1
                  FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
                  echo "##vso[task.logissue type=warning]Policy gate failed for: $ARTIFACT_NAME"
                fi
                
                # Save results with unique name
                if [ -f "results.json" ]; then
                  mv results.json "scan_results/results_${ARTIFACT_NAME}.json"
                fi
              done
              
              echo ""
              echo "=========================================="
              echo "Pipeline Scan completed for $SCAN_COUNT artifacts"
              if [ $FAILED -eq 1 ]; then
                echo "##vso[task.logissue type=error]Policy gate failed for:$FAILED_ARTIFACTS"
                echo "Artifacts with policy violations:$FAILED_ARTIFACTS"
              fi
              echo "=========================================="
              
              exit $FAILED
            displayName: 'Pipeline Scan (gate enabled, all artifacts)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/scan_results'
              artifactName: 'veracode-pipeline-gate-results'
            condition: succeededOrFailed()
            displayName: 'Publish Pipeline Scan results'

  # =============================================================================
  # Stage 4: Sandbox Scan - Release Branches (bundle zip)
  # =============================================================================
  - stage: SandboxScan
    displayName: 'Sandbox Scan (release)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - job: SandboxScanJob
        displayName: 'Veracode Sandbox Scan (bundle)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              UPLOAD_FILE=$(find verascan -name "veracode_upload_bundle.zip" | head -n1)
              if [ -z "$UPLOAD_FILE" ]; then
                echo "##vso[task.logissue type=error]veracode_upload_bundle.zip not found"
                exit 1
              fi
              echo "Upload bundle: $UPLOAD_FILE"
              echo "Bundle contents:"
              unzip -l "$UPLOAD_FILE"
              echo "##vso[task.setvariable variable=UPLOAD_FILE]$UPLOAD_FILE"
            displayName: 'Locate artifact bundle'

          - script: |
              echo "Downloading Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]Failed to get API Wrapper version"
                exit 1
              fi
              echo "Downloading version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]VeracodeJavaAPI.jar not found"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Download Veracode API Wrapper'

          - script: |
              echo "Uploading bundle to Veracode Sandbox..."
              echo "File: $(UPLOAD_FILE)"
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -sandboxname "$(SANDBOX_NAME)" \
                -createsandbox true \
                -filepath "$(UPLOAD_FILE)" \
                -version "Release $(Build.BuildNumber)"
            displayName: 'Veracode Sandbox Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

  # =============================================================================
  # Stage 5: Policy Scan - Main Branch (bundle zip)
  # =============================================================================
  - stage: PolicyScan
    displayName: 'Policy Scan (production)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PolicyScanJob
        displayName: 'Veracode Policy Scan (bundle)'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              UPLOAD_FILE=$(find verascan -name "veracode_upload_bundle.zip" | head -n1)
              if [ -z "$UPLOAD_FILE" ]; then
                echo "##vso[task.logissue type=error]veracode_upload_bundle.zip not found"
                exit 1
              fi
              echo "Upload bundle: $UPLOAD_FILE"
              echo "Bundle contents:"
              unzip -l "$UPLOAD_FILE"
              echo "##vso[task.setvariable variable=UPLOAD_FILE]$UPLOAD_FILE"
            displayName: 'Locate artifact bundle'

          - script: |
              echo "Downloading Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]Failed to get API Wrapper version"
                exit 1
              fi
              echo "Downloading version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]VeracodeJavaAPI.jar not found"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Download Veracode API Wrapper'

          - script: |
              echo "Uploading bundle to Veracode Platform..."
              echo "File: $(UPLOAD_FILE)"
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -filepath "$(UPLOAD_FILE)" \
                -version "Build $(Build.BuildNumber)"
            displayName: 'Veracode Policy Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)
