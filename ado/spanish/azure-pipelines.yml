# azure-pipelines.yml
# Escaneo de Seguridad Veracode para Azure Pipelines
#
# Variables requeridas (configurar en Variable Group "veracode-credentials"):
#   - VERACODE_API_ID: ID de API Veracode (secreto)
#   - VERACODE_API_KEY: Key de API Veracode (secreto)
#   - SRCCLR_API_TOKEN: SCA Agent Based (secreto, opcional)
#
# El tipo de escaneo se detecta automaticamente por branch:
#   feature/*  -> Pipeline Scan (sin gate)
#   PR a main  -> Pipeline Scan (gate en Very High/High)
#   release/*  -> Sandbox Scan
#   main       -> Policy Scan
#
# SCA se ejecuta en todos los branches.

trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*

pr:
  branches:
    include:
      - main

variables:
  - group: veracode-credentials
  # Configurar segun tu aplicacion
  - name: APP_NAME
    value: 'Azure_Application'
  - name: SANDBOX_NAME
    value: 'azure-release'

pool:
  vmImage: 'ubuntu-latest'

# =============================================================================
# Stage 1: Instalar Veracode CLI + Autopackager (se ejecuta siempre)
# =============================================================================
stages:
  - stage: Package
    displayName: 'Instalar y empaquetar'
    jobs:
      - job: PackageApp
        displayName: 'Veracode CLI autopackager'
        steps:
          # --- Instalar prerrequisitos ---
          - script: |
              echo "Instalando prerrequisitos..."
              sudo apt-get update && sudo apt-get install -y curl unzip grep
            displayName: 'Instalar prerrequisitos'

          # --- Instalar Veracode CLI ---
          - script: |
              echo "Instalando Veracode CLI..."
              curl -fsS -O https://tools.veracode.com/veracode-cli/install
              chmod +x ./install
              ./install
              if [ -f "./veracode" ]; then
                chmod +x veracode
                ./veracode version
              else
                echo "##vso[task.logissue type=error]Veracode CLI no se instalo correctamente"
                exit 1
              fi
            displayName: 'Instalar Veracode CLI'

          # --- Validar credenciales ---
          - script: |
              if [ -z "$VERACODE_API_ID" ] || [ -z "$VERACODE_API_KEY" ]; then
                echo "##vso[task.logissue type=error]VERACODE_API_ID y VERACODE_API_KEY son requeridos"
                echo "Configurar en variable groups de Azure Pipelines o Key Vault"
                exit 1
              fi
              echo "Credenciales de Veracode verificadas"
            displayName: 'Validar credenciales Veracode'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          # --- Autopackager ---
          - script: |
              echo "Ejecutando autopackager de Veracode..."
              mkdir -p verascan
              ./veracode package --source "$(Build.SourcesDirectory)" --output verascan --trust
              echo "Artefactos empaquetados:"
              ls -lhR verascan

              PACKAGED_FILE=$(find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) | head -n1)
              if [ -z "$PACKAGED_FILE" ]; then
                echo "##vso[task.logissue type=error]No se encontro ningun artefacto empaquetado"
                ls -lR verascan
                exit 1
              fi
              echo "Archivo principal empaquetado: $PACKAGED_FILE"
              echo "##vso[task.setvariable variable=PACKAGED_FILE]$PACKAGED_FILE"
            displayName: 'Veracode autopackager'

          # --- Publicar artefacto para stages downstream ---
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'
              artifactName: 'verascan'
            displayName: 'Publicar artefactos empaquetados'

  # =============================================================================
  # Stage 2: SCA (se ejecuta siempre, todos los branches)
  # =============================================================================
  - stage: SCA
    displayName: 'Escaneo SCA'
    dependsOn: Package
    jobs:
      - job: SCAScan
        displayName: 'Veracode Agent-Based SCA'
        steps:
          - checkout: self
          - script: |
              echo "Ejecutando Veracode Agent-Based SCA..."
              curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "Escaneo SCA completado"
            displayName: 'Escaneo Veracode SCA'
            env:
              SRCCLR_API_TOKEN: $(SRCCLR_API_TOKEN)

  # =============================================================================
  # Stage 3a: Pipeline Scan - Feature Branches (sin gate)
  # =============================================================================
  - stage: PipelineScan
    displayName: 'Pipeline Scan (feature)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/'),
        ne(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: PipelineScanJob
        displayName: 'Veracode Pipeline Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              PACKAGED_FILE=$(find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) | head -n1)
              echo "##vso[task.setvariable variable=PACKAGED_FILE]$PACKAGED_FILE"
            displayName: 'Localizar artefacto empaquetado'

          - script: |
              echo "Descargando Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip
              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]No se pudo descargar pipeline-scan.jar"
                exit 1
              fi
            displayName: 'Descargar Pipeline Scanner'

          - script: |
              echo "Ejecutando Veracode Pipeline Scan..."
              java -jar pipeline-scan.jar \
                -f "$(PACKAGED_FILE)" \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                --fail_on_severity "" \
                --issue_details true \
                || echo "Pipeline scan completado con hallazgos"
            displayName: 'Pipeline Scan (sin gate)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/results.json'
              artifactName: 'veracode-pipeline-results'
            condition: succeededOrFailed()
            displayName: 'Publicar resultados Pipeline Scan'

  # =============================================================================
  # Stage 3b: Pipeline Scan - Pull Requests (gate habilitado)
  # =============================================================================
  - stage: PipelineScanGate
    displayName: 'Pipeline Scan (PR gate)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PipelineScanGateJob
        displayName: 'Veracode Pipeline Scan con gate'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              PACKAGED_FILE=$(find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) | head -n1)
              echo "##vso[task.setvariable variable=PACKAGED_FILE]$PACKAGED_FILE"
            displayName: 'Localizar artefacto empaquetado'

          - script: |
              echo "Descargando Veracode Pipeline Scanner..."
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip
              if [ ! -f "pipeline-scan.jar" ]; then
                echo "##vso[task.logissue type=error]No se pudo descargar pipeline-scan.jar"
                exit 1
              fi
            displayName: 'Descargar Pipeline Scanner'

          - script: |
              echo "Ejecutando Veracode Pipeline Scan con Policy Gate..."
              java -jar pipeline-scan.jar \
                -f "$(PACKAGED_FILE)" \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                --fail_on_severity "Very High, High" \
                --issue_details true \
                --policy_name "Veracode Recommended Very High"
            displayName: 'Pipeline Scan (gate habilitado)'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/results.json'
              artifactName: 'veracode-pipeline-gate-results'
            condition: succeededOrFailed()
            displayName: 'Publicar resultados Pipeline Scan'

  # =============================================================================
  # Stage 4: Sandbox Scan - Release Branches
  # =============================================================================
  - stage: SandboxScan
    displayName: 'Sandbox Scan (release)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - job: SandboxScanJob
        displayName: 'Veracode Sandbox Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              PACKAGED_FILE=$(find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) | head -n1)
              echo "##vso[task.setvariable variable=PACKAGED_FILE]$PACKAGED_FILE"
            displayName: 'Localizar artefacto empaquetado'

          - script: |
              echo "Descargando Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]No se pudo obtener la version del API Wrapper"
                exit 1
              fi
              echo "Descargando version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]No se encontro VeracodeJavaAPI.jar"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Descargar Veracode API Wrapper'

          - script: |
              echo "Subiendo a Veracode Sandbox..."
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -sandboxname "$(SANDBOX_NAME)" \
                -createsandbox true \
                -filepath "$(PACKAGED_FILE)" \
                -version "Release $(Build.BuildNumber)"
            displayName: 'Veracode Sandbox Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)

  # =============================================================================
  # Stage 5: Policy Scan - Branch Main
  # =============================================================================
  - stage: PolicyScan
    displayName: 'Policy Scan (produccion)'
    dependsOn: Package
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PolicyScanJob
        displayName: 'Veracode Policy Scan'
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifactName: 'verascan'
              targetPath: '$(System.DefaultWorkingDirectory)/verascan'

          - script: |
              PACKAGED_FILE=$(find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) | head -n1)
              echo "##vso[task.setvariable variable=PACKAGED_FILE]$PACKAGED_FILE"
            displayName: 'Localizar artefacto empaquetado'

          - script: |
              echo "Descargando Veracode Java API Wrapper..."
              mkdir -p .veracode
              VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
              if [ -z "$VERSION" ]; then
                echo "##vso[task.logissue type=error]No se pudo obtener la version del API Wrapper"
                exit 1
              fi
              echo "Descargando version: $VERSION"
              curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
              cd .veracode && unzip -o dist.zip && cd ..
              JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
              if [ -z "$JAR_PATH" ]; then
                echo "##vso[task.logissue type=error]No se encontro VeracodeJavaAPI.jar"
                exit 1
              fi
              cp "$JAR_PATH" vosp-api-wrapper-java.jar
            displayName: 'Descargar Veracode API Wrapper'

          - script: |
              echo "Subiendo a la Plataforma Veracode..."
              java -jar vosp-api-wrapper-java.jar \
                -vid $VERACODE_API_ID \
                -vkey $VERACODE_API_KEY \
                -action UploadAndScan \
                -appname "$(APP_NAME)" \
                -createprofile true \
                -autoscan true \
                -filepath "$(PACKAGED_FILE)" \
                -version "Build $(Build.BuildNumber)"
            displayName: 'Veracode Policy Scan'
            env:
              VERACODE_API_ID: $(VERACODE_API_ID)
              VERACODE_API_KEY: $(VERACODE_API_KEY)
