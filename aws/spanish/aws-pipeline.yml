version: 0.2

# Variables de entorno necesarias:
# - VERACODE_API_ID (almacenado en AWS Secrets Manager o Parameter Store)
# - VERACODE_API_KEY (almacenado en AWS Secrets Manager o Parameter Store)
# - SRCCLR_API_TOKEN (opcional, para SCA)
# - SCAN_TYPE: "pipeline", "pipeline-gate", "policy", o "sandbox" (opcional, se detecta por branch)
# - BRANCH_NAME: inyectado por CodePipeline o definido manualmente (opcional, default: main)
#
# Comportamiento multi-artefacto:
#   pipeline/pipeline-gate -> Cada artefacto escaneado individualmente
#   policy/sandbox         -> Todos los artefactos en un solo zip

env:
  shell: bash
  variables:
    APP_NAME: "AWS_Application"
    SANDBOX_NAME: "aws-release"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Instalando prerrequisitos..."
      - apt-get update && apt-get install -y curl unzip grep
      
      - echo "Instalando Veracode CLI..."
      - curl -fsS -O https://tools.veracode.com/veracode-cli/install
      - chmod +x ./install
      - ./install
      - |
        if [ -f "./veracode" ]; then
          chmod +x veracode
          ./veracode version
        else
          echo "ERROR: Veracode CLI no se instalo correctamente"
          exit 1
        fi
  
  pre_build:
    commands:
      - echo "Fase de pre-build iniciada..."
      - echo "Branch - ${BRANCH_NAME:-main}"
      - echo "Build ID - ${CODEBUILD_BUILD_NUMBER}"
      - echo "Commit ID - ${CODEBUILD_RESOLVED_SOURCE_VERSION}"
      
      - |
        if [ -z "$VERACODE_API_ID" ] || [ -z "$VERACODE_API_KEY" ]; then
          echo "ERROR: VERACODE_API_ID y VERACODE_API_KEY son requeridos"
          echo "Configurar en Secrets Manager o como variables de entorno"
          exit 1
        fi
        echo "Credenciales de Veracode verificadas"
  
  build:
    commands:
      - echo "Ejecutando autopackager de Veracode..."
      - mkdir -p verascan
      - ./veracode package --source . --output verascan --trust
      - echo "Artefactos empaquetados:"
      - ls -lhR verascan
      
      # Listar y validar todos los artefactos
      - |
        echo "Listando todos los artefactos empaquetados..."
        find verascan -type f \( -name "*.war" -o -name "*.jar" -o -name "*.zip" \) > artifact_list.txt
        
        if [ ! -s artifact_list.txt ]; then
          echo "ERROR: No se encontraron artefactos empaquetados"
          echo "Verificar que el proyecto contiene codigo compilable"
          ls -lR verascan
          exit 1
        fi
        
        echo "Artefactos encontrados:"
        cat artifact_list.txt
        
        ARTIFACT_COUNT=$(wc -l < artifact_list.txt)
        echo "Total de artefactos: $ARTIFACT_COUNT"
      
      - echo "Ejecutando Veracode Agent-Based SCA..."
      - curl -sSL https://download.sourceclear.com/ci.sh | bash -s -- scan --recursive --update-advisor || echo "Escaneo SCA completado"
      
      # Determinar el tipo de escaneo basado en el branch o variable SCAN_TYPE
      - |
        set -e
        
        is_release_branch() {
          case "${BRANCH_NAME}" in
            release/*) return 0 ;;
            *) return 1 ;;
          esac
        }
        
        if [ "${SCAN_TYPE}" = "policy" ] || [ "${BRANCH_NAME}" = "main" ]; then
          echo "=== Ejecutando Policy Scan para Produccion ==="
          
          echo "Descargando Veracode Java API Wrapper..."
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "ERROR: No se pudo obtener la version del API Wrapper"
            exit 1
          fi
          echo "Descargando version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: No se encontro VeracodeJavaAPI.jar"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar
          
          echo "Subiendo artefactos a la Plataforma Veracode..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \
            -appname "$APP_NAME" \
            -createprofile true \
            -autoscan true \
            -filepath "verascan" \
            -version "Build ${CODEBUILD_BUILD_NUMBER}"
        
        elif [ "${SCAN_TYPE}" = "sandbox" ] || is_release_branch; then
          echo "=== Ejecutando Sandbox Scan para Release ==="
          
          echo "Descargando Veracode Java API Wrapper..."
          mkdir -p .veracode
          VERSION=$(curl -sS https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/maven-metadata.xml | grep -oPm1 "(?<=<latest>)[^<]+")
          if [ -z "$VERSION" ]; then
            echo "ERROR: No se pudo obtener la version del API Wrapper"
            exit 1
          fi
          echo "Descargando version: $VERSION"
          curl -sSL "https://repo1.maven.org/maven2/com/veracode/vosp/api/wrappers/vosp-api-wrappers-java/${VERSION}/vosp-api-wrappers-java-${VERSION}-dist.zip" -o .veracode/dist.zip
          cd .veracode && unzip -o dist.zip && cd ..
          JAR_PATH=$(find .veracode -type f -name "VeracodeJavaAPI*.jar" | head -n1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: No se encontro VeracodeJavaAPI.jar"
            exit 1
          fi
          cp "$JAR_PATH" vosp-api-wrapper-java.jar
          
          echo "Subiendo artefactos a Veracode Sandbox..."
          java -jar vosp-api-wrapper-java.jar \
            -vid $VERACODE_API_ID \
            -vkey $VERACODE_API_KEY \
            -action UploadAndScan \
            -appname "$APP_NAME" \
            -createprofile true \
            -autoscan true \
            -sandboxname "$SANDBOX_NAME" \
            -createsandbox true \
            -filepath "verascan" \
            -version "Release ${CODEBUILD_BUILD_NUMBER}"
        
        elif [ "${SCAN_TYPE}" = "pipeline-gate" ]; then
          echo "=== Ejecutando Pipeline Scan con Policy Gate (todos los artefactos) ==="
          
          echo "Descargando Veracode Pipeline Scanner..."
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "ERROR: No se pudo descargar pipeline-scan.jar"
            exit 1
          fi
          
          mkdir -p scan_results
          FAILED=0
          SCAN_COUNT=0
          FAILED_ARTIFACTS=""
          
          while IFS= read -r artifact; do
            # Saltar el bundle zip
            if [[ "$artifact" == *"veracode_upload_bundle.zip" ]]; then
              continue
            fi
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            if ! java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --issue_details true \
              --policy_name "Veracode Recommended Very High" \
              -jo true; then
              FAILED=1
              FAILED_ARTIFACTS="$FAILED_ARTIFACTS $ARTIFACT_NAME"
              echo "ADVERTENCIA: Policy gate fallido para: $ARTIFACT_NAME"
            fi
            
            # Renombrar archivo de resultados con prefijo del nombre del artefacto
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
          if [ $FAILED -eq 1 ]; then
            echo "ERROR: Policy gate fallido para:$FAILED_ARTIFACTS"
            exit 1
          fi
          echo "=========================================="
        
        else
          echo "=== Ejecutando Pipeline Scan (por defecto para feature branches, todos los artefactos) ==="
          
          echo "Descargando Veracode Pipeline Scanner..."
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip -o pipeline-scan-LATEST.zip
          
          if [ ! -f "pipeline-scan.jar" ]; then
            echo "ERROR: No se pudo descargar pipeline-scan.jar"
            exit 1
          fi
          
          mkdir -p scan_results
          SCAN_COUNT=0
          
          while IFS= read -r artifact; do
            # Saltar el bundle zip
            if [[ "$artifact" == *"veracode_upload_bundle.zip" ]]; then
              continue
            fi
            SCAN_COUNT=$((SCAN_COUNT + 1))
            ARTIFACT_NAME=$(basename "$artifact")
            echo ""
            echo "=========================================="
            echo "Escaneando [$SCAN_COUNT]: $ARTIFACT_NAME"
            echo "=========================================="
            
            java -jar pipeline-scan.jar \
              -f "$artifact" \
              -vid $VERACODE_API_ID \
              -vkey $VERACODE_API_KEY \
              --fail_on_severity "" \
              --issue_details true \
              -jo true \
              || echo "Pipeline scan completado con hallazgos para $ARTIFACT_NAME"
            
            # Renombrar archivo de resultados con prefijo del nombre del artefacto
            if [ -f "results.json" ]; then
              mv results.json "scan_results/${ARTIFACT_NAME}_results.json"
              echo "Resultados guardados: scan_results/${ARTIFACT_NAME}_results.json"
            else
              echo "ADVERTENCIA: No se produjo results.json para $ARTIFACT_NAME (el artefacto puede no ser escaneable)"
            fi
          done < artifact_list.txt
          
          echo ""
          echo "=========================================="
          echo "Pipeline Scan completado para $SCAN_COUNT artefactos"
          echo "=========================================="
        fi
  
  post_build:
    commands:
      - echo "Build completado el $(date)"
      - echo "Artefactos de escaneo disponibles en verascan y scan_results"

artifacts:
  files:
    - 'verascan/**/*'
    - 'artifact_list.txt'
    - 'scan_results/**/*'
  name: veracode-scan-artifacts

cache:
  paths:
    - '/root/.m2/**/*'
    - '/root/.gradle/**/*'
    - 'node_modules/**/*'
    - '.nuget/**/*'
